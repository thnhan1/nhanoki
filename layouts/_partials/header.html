<nav class="flex align-center">
  <a href="{{ "/" | relLangURL }}" class="plain flex-grow font-medium">{{ site.Title }}</a>
  {{ range site.Menus.main }}
    <a href="{{ .URL | relLangURL }}" class="plain muted sl">{{ .Name }}</a>

    <span class="theme-toggle-switch"></span>
  </button>
</nav>
