{{- $lang := .Type | default "text" -}}
{{- $title := .Attributes.title -}}
{{- $raw := trim .Inner "\n" -}}
<div class="codeblock{{ with $title }} has-title{{ end }}">
  {{- with $title -}}
    <div class="codeblock-title">{{ . }}</div>
  {{- end -}}
  <button class="copy-btn" data-clipboard-text="{{ $raw }}" aria-label="Copy code" title="Copy">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path></svg>
  </button>
  {{- transform.Highlight $raw $lang .Options -}}
</div>
