{{ define "main" }}
<div class="wrap">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  
  <ul class="list-plain home-writing">
    {{ range .Pages.ByDate.Reverse }}
      <li class="flex">
        <span class="muted tabular-nums home-writing-date">{{ .Date.Format "2006 · 01" }}</span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
    {{ end }}
  </ul>
</div>
{{ end }}
